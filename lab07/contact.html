<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact & Feedback</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar">
    <a href="tierlist.html" class="nav-link"> Tier List</a>
    <a href="contact.html" class="nav-link active"> Contact</a>
  </nav>

  <main class="container">
    <h1 class="page-title">Share Your Thoughts</h1>

    <div class="form-box">
      <form>

        <!-- Name -->
        <div class="form-group">
          <label for="name">Your Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="e.g. Jane Doe"
            required
          >
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="e.g. jane@email.com"
            required
          >
        </div>

        <!-- Comments -->
        <div class="form-group">
          <label for="comments">Your Comments:</label>
          <textarea
            id="comments"
            name="comments"
            rows="5"
            maxlength="1600"
            placeholder="Tell me what you think about the tier list..."
            required
          ></textarea>
        </div>

        <!-- Skin Type - Radio -->
        <div class="form-group">
          <fieldset>
            <legend>What is your skin type?</legend>
            <label><input type="radio" name="skin_type" value="oily"> Oily</label>
            <label><input type="radio" name="skin_type" value="dry"> Dry</label>
            <label><input type="radio" name="skin_type" value="combination"> Combination</label>
            <label><input type="radio" name="skin_type" value="sensitive"> Sensitive</label>
            <label><input type="radio" name="skin_type" value="normal"> Normal</label>
          </fieldset>
        </div>

        <!-- Favorite Category - Dropdown -->
        <div class="form-group">
          <label for="category">Favorite Skincare Category:</label>
          <select id="category" name="category">
            <option value="">-- Select one --</option>
            <option value="serum">Serum</option>
            <option value="moisturizer">Moisturizer</option>
            <option value="sunscreen">Sunscreen</option>
            <option value="mask">Face Mask</option>
            <option value="cleanser">Cleanser</option>
            <option value="eye_cream">Eye Cream</option>
          </select>
        </div>

        <!-- Products Used - Checkboxes -->
        <div class="form-group">
          <fieldset>
            <legend>Which products from the list have you tried?</legend>
            <label><input type="checkbox" name="tried" value="vitamin_c"> Vitamin C Serum</label>
            <label><input type="checkbox" name="tried" value="snail_mucin"> Snail Mucin Essence</label>
            <label><input type="checkbox" name="tried" value="niacinamide"> Niacinamide 10% + Zinc</label>
            <label><input type="checkbox" name="tried" value="spf"> SPF 50 Sunscreen</label>
            <label><input type="checkbox" name="tried" value="cerave"> Hyaluronic Acid Moisturizer</label>
          </fieldset>
        </div>

        <!-- Overall Rating - Range -->
        <div class="form-group">
          <label for="rating">How accurate do you think this tier list is? (1 = Disagree, 10 = Totally agree)</label>
          <input type="range" id="rating" name="rating" min="1" max="10" value="5">
          <span class="range-hint">Slide to rate</span>
        </div>

        <button type="submit">Send Feedback</button>

      </form>
    </div>
  </main>

  <footer class="site-footer">
    <p>Khin &nbsp;|&nbsp; <a href="mailto:your@email.com">your@email.com</a></p>
  </footer>

</body>
</html>
